<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="popup.css" />
    <title>HTTP Header Manager</title>
    <script src="theme.js"></script>
  </head>
  <body>
    <header class="header">
      <div class="header__title">
        <img
          class="header__icon"
          src="icons/icon16.png"
          srcset="icons/icon16.png 1x, icons/icon32.png 2x, icons/icon48.png 3x"
          alt=""
          width="16"
          height="16"
        />
        <h1>Header Manager</h1>
      </div>
      <div class="header__actions">
        <span class="header__count" id="count"></span>
        <div class="segmented" id="theme" role="group" aria-label="Theme">
          <button class="segmented__item" data-theme-value="light" type="button" title="Light" aria-label="Light">
            <svg viewBox="0 0 16 16" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round">
              <circle cx="8" cy="8" r="3" />
              <path d="M8 1v1.6M8 13.4V15M15 8h-1.6M2.6 8H1M12.9 3.1l-1.1 1.1M4.2 11.8l-1.1 1.1M12.9 12.9l-1.1-1.1M4.2 4.2L3.1 3.1" />
            </svg>
          </button>
          <button class="segmented__item" data-theme-value="system" type="button" title="System" aria-label="System">
            <svg viewBox="0 0 16 16" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round">
              <rect x="1.5" y="2.5" width="13" height="9" rx="1.5" />
              <path d="M5.5 14.5h5" stroke-linecap="round" />
            </svg>
          </button>
          <button class="segmented__item" data-theme-value="dark" type="button" title="Dark" aria-label="Dark">
            <svg viewBox="0 0 16 16" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round">
              <path d="M13.5 9.6A6 6 0 0 1 6.4 2.5a6 6 0 1 0 7.1 7.1z" />
            </svg>
          </button>
        </div>
      </div>
    </header>

    <div class="table">
      <div class="table__head">
        <span></span>
        <span>Operation</span>
        <span>Header</span>
        <span>Value</span>
        <span></span>
      </div>
      <div class="table__body" id="list"></div>
      <p class="empty" id="empty">No rules yet. Add one to start modifying requests.</p>
    </div>

    <footer class="footer">
      <button class="button button--primary" id="add" type="button">
        <span class="button__plus">+</span> Add rule
      </button>
    </footer>

    <datalist id="header-names"></datalist>

    <template id="row-template">
      <div class="row">
        <label class="toggle">
          <input type="checkbox" data-field="enabled" />
          <span class="toggle__track"><span class="toggle__thumb"></span></span>
        </label>
        <select class="select" data-field="operation">
          <option value="add">Add</option>
          <option value="replace">Replace</option>
          <option value="remove">Remove</option>
        </select>
        <input
          class="input"
          data-field="header"
          list="header-names"
          placeholder="Accept"
          spellcheck="false"
          autocomplete="off"
        />
        <input
          class="input"
          data-field="value"
          placeholder="application/json"
          spellcheck="false"
          autocomplete="off"
        />
        <button class="delete" data-action="delete" type="button" title="Delete rule">
          <svg viewBox="0 0 16 16" aria-hidden="true">
            <path
              d="M6 2.5h4M2.5 4.5h11M4.5 4.5l.6 8a1.5 1.5 0 0 0 1.5 1.4h2.8a1.5 1.5 0 0 0 1.5-1.4l.6-8"
              fill="none"
              stroke="currentColor"
              stroke-width="1.3"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </button>
      </div>
    </template>

    <script src="rules.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
